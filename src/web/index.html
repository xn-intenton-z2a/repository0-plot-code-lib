<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plot Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; color: #222; }
    header { display:flex; align-items: baseline; gap: 1rem; }
    input, button { font-size: 1rem; padding: 0.4rem; }
    #controls { display:flex; gap: 0.5rem; align-items: center; margin: 1rem 0; }
    #plot-svg { border: 1px solid #eee; width: 100%; height: auto; display: block; }
    #points-count { margin-top: 0.5rem; color: #555; }
    #demo-output { margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1 id="lib-name">Plot Demo</h1>
    <div id="lib-version" style="font-size:0.9rem;color:#666"></div>
  </header>

  <section id="demo">
    <div id="controls">
      <label>Expression: <input id="expr-input" value="y=Math.sin(x)" style="width:320px" /></label>
      <label>Range: <input id="range-input" value="-3.14:0.01:3.14" style="width:180px" /></label>
      <button id="plot-btn">Plot</button>
    </div>
    <div id="demo-output">
      <div id="plot-container">
        <div id="points-count">0 points</div>
        <div id="plot-wrapper" aria-live="polite" data-ready="false"></div>
      </div>
    </div>
  </section>

  <script type="module">
    import { parseExpression, parseRange, evaluateRange, renderSVG, name, version } from './lib.js';

    document.getElementById('lib-name').textContent = name || 'Plot Demo';
    document.getElementById('lib-version').textContent = version ? `v${version}` : '';

    const exprInput = document.getElementById('expr-input');
    const rangeInput = document.getElementById('range-input');
    const plotBtn = document.getElementById('plot-btn');
    const plotWrapper = document.getElementById('plot-wrapper');
    const pointsCount = document.getElementById('points-count');

    function renderSeries(series) {
      try {
        const svg = renderSVG(series, { width: 800, height: 240 });
        plotWrapper.innerHTML = svg;
        pointsCount.textContent = `${series.length} points`;
        plotWrapper.setAttribute('data-ready', 'true');
      } catch (err) {
        plotWrapper.textContent = 'Error rendering: ' + err.message;
        plotWrapper.setAttribute('data-ready', 'error');
      }
    }

    function doPlot() {
      try {
        const expr = exprInput.value;
        const rangeStr = rangeInput.value;
        const fn = parseExpression(expr);
        const { start, step, end } = parseRange(rangeStr);
        const series = evaluateRange(fn, start, step, end);
        renderSeries(series);
      } catch (err) {
        plotWrapper.textContent = 'Error: ' + err.message;
        plotWrapper.setAttribute('data-ready', 'error');
      }
    }

    plotBtn.addEventListener('click', doPlot);

    // Auto-plot on load; run after DOM is stable to avoid race conditions in slow CI
    window.addEventListener('DOMContentLoaded', () => {
      // Use requestAnimationFrame to schedule the initial render as soon as possible
      requestAnimationFrame(() => {
        try {
          doPlot();
        } catch (e) {
          // ignore
        }
      });
    });
  </script>
</body>
</html>
